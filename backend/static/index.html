<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>HAR Dashboard</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
    <style>
      :root {
        --bg: #f6f8fb;
        --card: #ffffff;
        --accent: #0f766e;
        --text: #1f2937;
        --muted: #6b7280;
        --line: #e5e7eb;
      }
      * {
        box-sizing: border-box;
      }
      body {
        margin: 0;
        font-family: "Segoe UI", sans-serif;
        color: var(--text);
        background: radial-gradient(circle at top left, #d1fae5 0%, var(--bg) 38%);
      }
      .container {
        max-width: 1200px;
        margin: 0 auto;
        padding: 24px;
      }
      .title {
        font-size: 28px;
        font-weight: 700;
      }
      .subtitle {
        color: var(--muted);
        margin-top: 4px;
      }
      .actions {
        margin-top: 14px;
      }
      .danger-btn {
        border: 1px solid #ef4444;
        background: #ffffff;
        color: #b91c1c;
        border-radius: 10px;
        padding: 8px 12px;
        font-weight: 600;
        cursor: pointer;
      }
      .danger-btn:hover {
        background: #fef2f2;
      }
      .cards {
        margin-top: 20px;
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
        gap: 16px;
      }
      .card {
        background: var(--card);
        border: 1px solid var(--line);
        border-radius: 14px;
        padding: 14px;
      }
      .kpi-label {
        color: var(--muted);
        font-size: 13px;
      }
      .kpi-value {
        margin-top: 8px;
        font-size: 30px;
        font-weight: 700;
      }
      .grid {
        margin-top: 20px;
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
        gap: 16px;
      }
      table {
        width: 100%;
        border-collapse: collapse;
        margin-top: 20px;
        background: var(--card);
        border: 1px solid var(--line);
        border-radius: 12px;
        overflow: hidden;
      }
      th,
      td {
        padding: 10px;
        text-align: left;
        border-bottom: 1px solid var(--line);
        font-size: 13px;
      }
      th {
        background: #f3f4f6;
      }
      .ok {
        color: #0a7b36;
        font-weight: 700;
      }
      .bad {
        color: #b91c1c;
        font-weight: 700;
      }
      @media (max-width: 800px) {
        .kpi-value {
          font-size: 22px;
        }
      }
    </style>
  </head>
  <body>
    <div class="container">
      <div class="title">HAR Dashboard</div>
      <div class="subtitle">Tabela de coletas + graficos de distribuicao e acuracia</div>
      <div class="actions">
        <button id="clear-data-btn" class="danger-btn" type="button">Apagar dados</button>
      </div>
      <div id="status-msg" style="margin-top:10px;color:var(--muted);font-size:13px;"></div>

      <section class="cards">
        <article class="card">
          <div class="kpi-label">Total de Coletas</div>
          <div class="kpi-value" id="kpi-total">0</div>
        </article>
        <article class="card">
          <div class="kpi-label">Taxa de Acerto</div>
          <div class="kpi-value" id="kpi-acc">0%</div>
        </article>
      </section>

      <section class="grid">
        <article class="card">
          <canvas id="classChart"></canvas>
        </article>
        <article class="card">
          <canvas id="accChart"></canvas>
        </article>
      </section>

      <table>
        <thead>
          <tr>
            <th>ID</th>
            <th>Data</th>
            <th>Dispositivo</th>
            <th>Usuario</th>
            <th>Classe Predita</th>
            <th>Classe Real</th>
            <th>Acertou</th>
            <th>Confianca</th>
            <th>Prob. Top Classe</th>
            <th>Amostras</th>
          </tr>
        </thead>
        <tbody id="rows"></tbody>
      </table>
    </div>

    <script>
      let classChart;
      let accChart;

      function pct(n) {
        if (!isFinite(n)) return "0%";
        return `${(n * 100).toFixed(1)}%`;
      }

      function setStatusMessage(msg) {
        const el = document.getElementById("status-msg");
        if (el) el.innerText = msg || "";
      }

      // Fetch com retry para tolerar cold-start do Cloud Run (1ª chamada pode
      // levar 10-30s e retornar 503/504 enquanto a instância sobe).
      async function fetchJson(url, { retries = 2, timeoutMs = 30000 } = {}) {
        let lastErr;
        for (let attempt = 0; attempt <= retries; attempt++) {
          const ctrl = new AbortController();
          const t = setTimeout(() => ctrl.abort(), timeoutMs);
          try {
            const resp = await fetch(url, { signal: ctrl.signal, cache: "no-store" });
            clearTimeout(t);
            if (!resp.ok) {
              // 5xx => provavelmente cold-start; tenta de novo.
              if (resp.status >= 500 && attempt < retries) {
                setStatusMessage(`Servidor acordando (HTTP ${resp.status})... tentando novamente`);
                await new Promise((r) => setTimeout(r, 1500 * (attempt + 1)));
                continue;
              }
              const body = await resp.text().catch(() => "");
              throw new Error(`HTTP ${resp.status} em ${url}: ${body.slice(0, 200)}`);
            }
            const ct = resp.headers.get("content-type") || "";
            if (!ct.includes("application/json")) {
              const body = await resp.text().catch(() => "");
              throw new Error(`Resposta nao-JSON de ${url}: ${body.slice(0, 200)}`);
            }
            return await resp.json();
          } catch (err) {
            clearTimeout(t);
            lastErr = err;
            if (attempt < retries) {
              setStatusMessage(`Tentando reconectar (${attempt + 1}/${retries})...`);
              await new Promise((r) => setTimeout(r, 1500 * (attempt + 1)));
              continue;
            }
          }
        }
        throw lastErr;
      }

      function drawCharts(summary) {
        if (typeof Chart === "undefined") {
          setStatusMessage("Falha ao carregar a biblioteca Chart.js (CDN bloqueado?).");
          return;
        }

        const byClass = (summary && summary.by_class) || {};
        const accuracy = (summary && summary.accuracy) || { correct: 0, incorrect: 0 };

        const classLabels = Object.keys(byClass);
        const classValues = Object.values(byClass);
        const hasClassData = classValues.some((v) => v > 0);

        const accLabels = ["Acertos", "Erros"];
        const accValues = [accuracy.correct || 0, accuracy.incorrect || 0];
        const hasAccData = accValues.some((v) => v > 0);

        if (classChart) classChart.destroy();
        if (accChart) accChart.destroy();

        classChart = new Chart(document.getElementById("classChart"), {
          type: "pie",
          data: {
            labels: hasClassData ? classLabels : ["Sem dados"],
            datasets: [
              {
                data: hasClassData ? classValues : [1],
                backgroundColor: hasClassData
                  ? ["#0f766e", "#0ea5e9", "#f59e0b", "#a855f7", "#10b981", "#f43f5e"]
                  : ["#e5e7eb"],
              },
            ],
          },
          options: {
            plugins: {
              title: { display: true, text: "Distribuicao por Classe Predita" },
              legend: { display: hasClassData },
            },
          },
        });

        accChart = new Chart(document.getElementById("accChart"), {
          type: "pie",
          data: {
            labels: hasAccData ? accLabels : ["Sem dados"],
            datasets: [
              {
                data: hasAccData ? accValues : [1],
                backgroundColor: hasAccData ? ["#16a34a", "#dc2626"] : ["#e5e7eb"],
              },
            ],
          },
          options: {
            plugins: {
              title: { display: true, text: "Acerto vs Erro" },
              legend: { display: hasAccData },
            },
          },
        });
      }

      function drawTable(coletas) {
        const rows = document.getElementById("rows");
        rows.innerHTML = "";

        for (const item of coletas) {
          const tr = document.createElement("tr");
          const okClass = item.is_correct ? "ok" : "bad";
          tr.innerHTML = `
            <td>${item.id}</td>
            <td>${new Date(item.created_at).toLocaleString()}</td>
            <td>${item.device}</td>
            <td>${item.user_name}</td>
            <td>${item.predicted_class}</td>
            <td>${item.real_class}</td>
            <td class="${okClass}">${item.is_correct ? "Sim" : "Nao"}</td>
            <td>${pct(item.confidence)}</td>
            <td>${pct(item.top_class_probability)}</td>
            <td>${item.sample_count}</td>
          `;
          rows.appendChild(tr);
        }
      }

      async function loadData() {
        setStatusMessage("Carregando dados...");
        const [coletas, summary] = await Promise.all([
          fetchJson("/v1/coletas?limit=300"),
          fetchJson("/v1/dashboard-summary"),
        ]);

        const safeColetas = Array.isArray(coletas) ? coletas : [];
        const safeSummary = summary || { by_class: {}, accuracy: { correct: 0, incorrect: 0 } };

        const total = safeColetas.length;
        const acc =
          (safeSummary.accuracy?.correct || 0) + (safeSummary.accuracy?.incorrect || 0);
        const accRate = acc === 0 ? 0 : (safeSummary.accuracy.correct || 0) / acc;

        document.getElementById("kpi-total").innerText = String(total);
        document.getElementById("kpi-acc").innerText = pct(accRate);

        drawCharts(safeSummary);
        drawTable(safeColetas);
        setStatusMessage(total === 0 ? "Nenhuma coleta registrada ainda." : "");
      }

      async function clearData() {
        const shouldDelete = window.confirm(
          "Você tem certeza? Esta ação não pode ser desfeita.",
        );
        if (!shouldDelete) return;

        const resp = await fetch("/v1/coletas", { method: "DELETE" });
        if (!resp.ok) {
          const body = await resp.text();
          throw new Error(`Falha ao apagar dados (HTTP ${resp.status}): ${body}`);
        }

        await loadData();
        alert("Dados apagados com sucesso.");
      }

      document
        .getElementById("clear-data-btn")
        .addEventListener("click", () => {
          clearData().catch((err) => {
            console.error(err);
            alert(`Falha ao apagar dados.\n\n${err && err.message ? err.message : err}`);
          });
        });

      loadData().catch((err) => {
        console.error(err);
        setStatusMessage(`Falha ao carregar: ${err && err.message ? err.message : err}`);
        alert(
          `Falha ao carregar dados do dashboard.\n\nDetalhe: ${
            err && err.message ? err.message : err
          }\n\nDica: aguarde alguns segundos (servidor pode estar acordando) e atualize a página (Cmd+Shift+R).`,
        );
      });
    </script>
  </body>
</html>
